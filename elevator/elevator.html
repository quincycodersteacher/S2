<!DOCTYPE html>
<html lang="en">

<body>
    <div class="container">
        <h1>Elevator</h1>

        <button class="myBtn" onclick="run()">
            Click here
        </button>
        <canvas id="elevatorCanvas" width="800" height="400"></canvas>
    </div>
    <script type="module" src="js/elevator.js"></script>
    <script type="module">
        import { Simulation } from './js/elevator.js';

        let sim;

        function run() {
            if (!sim) {
                // Create a new simulation with 1 elevator, 3 floors, and 1 new person per second in each floor
                sim = new Simulation(1, 3, 1, document.getElementById('elevatorCanvas'));
            }
            sim.toggleRun();
        }

        window.run = run;
    </script>
</body>

</html>
