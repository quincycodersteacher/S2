<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elevator Simulation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        h1 {
            color: #ffffff;
            font-size: 2.5rem;
            font-weight: 300;
            letter-spacing: 2px;
            text-shadow: 0 2px 10px rgba(233, 69, 96, 0.3);
        }

        h1 span {
            color: #e94560;
            font-weight: 600;
        }

        .controls {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .myBtn {
            background: linear-gradient(135deg, #e94560 0%, #533483 100%);
            color: white;
            border: none;
            padding: 14px 35px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .myBtn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(233, 69, 96, 0.5);
        }

        .myBtn:active {
            transform: translateY(0);
        }

        #elevatorCanvas {
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5),
                        0 0 0 1px rgba(255, 255, 255, 0.1);
        }

        .info {
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            text-align: center;
            max-width: 500px;
            line-height: 1.6;
        }

        .legend {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 10px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 13px;
        }

        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }
    </style>
</head>

<body>
    <div class="container">
        <h1><span>Elevator</span> Simulation</h1>

        <div class="controls">
            <button class="myBtn" onclick="run()">
                Start / Pause
            </button>
        </div>

        <canvas id="elevatorCanvas" width="800" height="450"></canvas>

        <div class="info">
            <p>Watch elevators pick up passengers and deliver them to their destinations.</p>
            <p>Each person is colored by their destination floor.</p>
            <div class="legend">
                <div class="legend-item">
                    <div class="legend-color" style="background: #4ECDC4;"></div>
                    <span>Going Up</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #FF6B6B;"></div>
                    <span>Going Down</span>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { Simulation } from './js/elevator.js';

        let sim;

        function run() {
            if (!sim) {
                sim = new Simulation(2, 3, 1, document.getElementById('elevatorCanvas'));
            }
            sim.toggleRun();
        }

        window.run = run;
    </script>
</body>

</html>
